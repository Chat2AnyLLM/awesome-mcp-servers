name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate servers
        run: make validate

      - name: Build generated files
        run: make build

      - name: Check generated files are up to date
        run: |
          if ! git diff --quiet dist/ README.md; then
            echo "ERROR: generated files are out of date. Run 'make build', then commit the changes."
            git diff -- dist/ README.md
            exit 1
          fi
